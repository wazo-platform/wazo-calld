; Endpoint/AOR used only by the ARI connection-pool load test
; (integration_tests/load_tests). It exists so dial_mobile's
; dial_all_contacts() can resolve PJSIP_ENDPOINT(<aor>,PICKUPMARK) instead of
; erroring (HTTP 500 "Unable to read provided function") on chan-test channels,
; which would kill the StasisStart handler before any _PollingContactDialer is
; created. PICKUPMARK is not a native PJSIP_ENDPOINT field; it is exposed via
; set_var so PJSIP_ENDPOINT(load-test-aor,PICKUPMARK) reads it back.
;
; The AOR has NO contact: PJSIP_DIAL_CONTACTS(load-test-aor) returns empty, so
; each dialer sustains its polling loop forever (channels.get + getChannelVar
; every 0.25s) instead of originating a contact and stopping when it bridges.
; Sustained pollers are what accumulate concurrent in-flight ARI calls.

[load-test-aor]
type=aor

[load-test-aor]
type=endpoint
aors=load-test-aor
set_var=PICKUPMARK=loadtestmark
